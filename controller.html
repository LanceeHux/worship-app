<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Controller</title>

<style>
body{
  font-family:sans-serif;
  padding:20px;
}

button{
  width:100%;
  padding:20px;
  font-size:24px;
  margin:10px 0;
}
</style>
</head>
<body>

<h2>Worship Controller</h2>

<button onclick="sendSlide(0)">Verse 1</button>
<button onclick="sendSlide(1)">Verse 2</button>
<button onclick="sendSlide(2)">Chorus</button>

<script>
function sendSlide(index){
  localStorage.setItem("currentSlide", index);
}
</script>

</body>
</html>
