<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Controller</title>

<style>
body{
  font-family:sans-serif;
  padding:20px;
}

button{
  width:100%;
  padding:20px;
  font-size:24px;
  margin:10px 0;

<body>

<h2>Worship Controller</h2>

<button onclick="sendSlide(0)">Verse 1</button>
<button onclick="sendSlide(1)">Verse 2</button>
<button onclick="sendSlide(2)">Chorus button</button>
  <button onclick="setBG('14122662_1920_1080_24fps.mp4')">Background 1</button>
<button onclick="setBG('bg2.mp4')">Background 2</button>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBTGuutbEEzmNg9Xd_dPly6DmG3hmW0hPE",
  databaseURL: "https://worship-app-4ab68-default-rtdb.firebaseio.com",
  projectId: "worship-app-4ab68"
};

if (!firebase.apps.length) {
  firebase.initializeApp(firebaseConfig);
}

const db = firebase.database();

function sendSlide(index){
  db.ref("slide").set(index);
}

function setBG(name){
  db.ref("bg").set(name);
}
  
</script>
