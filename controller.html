<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Worship Controller</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#111;
  color:white;
}

/* top bar */
.topbar{
  padding:15px;
  font-size:18px;
  background:#1a1a1a;
  border-bottom:1px solid #333;
}

/* layout */
.container{
  display:flex;
  height:100vh;
}

/* left panel */
.panel{
  width:220px;
  background:#161616;
  padding:10px;
  border-right:1px solid #333;
}

/* main grid */
.main{
  flex:1;
  padding:15px;
}

/* section title */
.section-title{
  font-size:14px;
  color:#888;
  margin:15px 0 8px;
}

/* buttons */
.cue{
  width:100%;
  padding:12px;
  margin:6px 0;
  background:#222;
  border:1px solid #333;
  color:white;
  font-size:14px;
  cursor:pointer;
  border-radius:6px;
}

.cue:hover{
  background:#333;
}

.bg-cue{
  background:#1d2a3a;
}

.bg-cue:hover{
  background:#2b3d55;
}

/* preview box */
.preview{
  background:#000;
  height:300px;
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  color:white;
  font-size:32px;
  padding:20px;
  border:1px solid #333;
}
</style>
</head>

<body>

<div class="topbar">
🎛 Worship Controller
</div>

<div class="container">

  <!-- LEFT PANEL -->
 <div class="panel">

  <div class="section-title">SONGS</div>

  <button class="cue" onclick="loadSong(0)">Here as in Heaven</button>
  <button class="cue" onclick="loadSong(1)">Amazing Grace</button>

  <div class="section-title" id="songTitle">SELECT A SONG</div>

  <div id="partsContainer">
    <p style="opacity:0.5;font-size:12px;">No song selected</p>
  </div>

  <div class="section-title">BACKGROUND</div>

  <button class="cue bg-cue" onclick="setBG('14122662_1920_1080_24fps.mp4')">Background 1</button>
  <button class="cue bg-cue" onclick="setBG('bg2.mp4')">Worship 2</button>

</div>

  <!-- MAIN PANEL -->
  <div class="main">

    <h2 style="opacity:0.7;">Preview Panel</h2>
    <p id="bgInfo">Background Active:</p>
    <div class="preview" id="preview">
      Loading preview...
    </div>

  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBTGuutbEEzmNg9Xd_dPly6DmG3hmW0hPE",
  databaseURL: "https://worship-app-4ab68-default-rtdb.firebaseio.com",
  projectId: "worship-app-4ab68"
};

if (!firebase.apps.length) {
  firebase.initializeApp(firebaseConfig);
}

const db = firebase.database();

const slides = [
  "Verse 1",
  "Verse 2",
  "Chorus"
];
const songs = [
  {
    title: "Here as in Heaven",
    parts: [
      {
        name: "Verse 1",
        lyrics: [
          "We worship You",
          "We worship You"
        ]
      },
      {
        name: "Verse 2",
        lyrics: [
          "Spirit come",
          "Fall on us"
        ]
      },
      {
        name: "Chorus",
        lyrics: [
          "Here as in heaven",
          "Come move among us"
        ]
      }
    ]
  }
];

/* send controls */
function sendSlide(index){
 db.ref("lyrics").on("value", (snap) => {
  document.getElementById("lyrics").innerHTML = snap.val() || "";
});
}

function setBG(name){
  db.ref("bg").set(name);
}

/* LIVE PREVIEW (like ProPresenter) */
db.ref("slide").on("value", (snap) => {
  const index = snap.val() || 0;
  document.getElementById("preview").innerHTML = slides[index];
});

const bgInfo = document.getElementById("bgInfo");
const firstBG = document.getElementById("firstBG");
const secondBG = document.getElementById("secondBG");
  firstBG.addEventListener("click", function() {
    bgInfo.textContent = "Background Active: Background 1";
  });
  secondBG.addEventListener("click", function() {
    bgInfo.textContent = "Background Active: Background 2";
  });

  function loadSong(index){
  const song = songs[index];

  document.getElementById("songTitle").innerText = song.title;

  const container = document.getElementById("partsContainer");
  container.innerHTML = "";

  song.parts.forEach((part, i) => {

    // PART TITLE (not clickable slide yet)
    const title = document.createElement("div");
    title.style.marginTop = "10px";
    title.style.fontWeight = "bold";
    title.style.color = "#aaa";
    title.innerText = part.name;

    container.appendChild(title);

    // LYRICS (each line clickable)
    part.lyrics.forEach((line, j) => {
      const btn = document.createElement("button");
      btn.className = "cue";
      btn.style.marginLeft = "10px";
      btn.innerText = line;

      btn.onclick = () => {
        db.ref("lyrics").set(line);
      };

      container.appendChild(btn);
    });

  });
}
</script>

</body>
</html>
