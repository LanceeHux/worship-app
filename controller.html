<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Worship Controller & Manager</title>

<style>
:root {
  --accent: #ffcd00;
  --accent-rgb: 255, 205, 0;
  --bg: #09090b;
  --panel: #121214;
  --panel2: #1a1a1e;
  --border: #2a2a30;
  --text: #f4f4f5;
  --text-muted: #a1a1aa;
  --danger: #ef4444;
  --success: #22c55e;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
  overflow-x: hidden;
}

/* TOPBAR */
.topbar {
  padding: 16px;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  z-index: 100;
}

.brand { font-weight: 700; font-size: 15px; }
.brand span { color: var(--accent); }
.top-actions { display: flex; gap: 12px; align-items: center; }

/* DESKTOP LAYOUT DEFINITION */
.container { 
  display: flex; 
  height: calc(100vh - 54px); 
}

/* LEFT PANEL (SONGS & BG) */
.panel {
  width: 320px;
  background: var(--panel);
  border-right: 1px solid var(--border);
  padding: 20px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 24px;
}

.section-title {
  color: var(--text-muted);
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin-bottom: 10px;
}

.song-list { display: flex; flex-direction: column; gap: 8px; }

.cue {
  width: 100%;
  padding: 14px;
  background: var(--panel2);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 8px;
  cursor: pointer;
  text-align: left;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 14px;
}

.cue:hover { border-color: var(--accent); }
.cue .delete-song-btn { 
  background: transparent; border: none; color: var(--text-muted); cursor: pointer; font-size: 16px; padding: 4px 8px;
}
.cue .delete-song-btn:hover { color: var(--danger); }

/* BACKGROUND GRAPHICS */
.bg-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.bg-thumb {
  background: var(--panel2); border: 1px solid var(--border); border-radius: 6px;
  cursor: pointer; overflow: hidden; height: 55px; padding: 0; width: 100%;
}
.bg-thumb:hover, .bg-thumb.active { border-color: var(--accent); }
.bg-thumb video { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }

/* CENTER WORKSPACE */
.workspace { flex: 1; padding: 24px; overflow-y: auto; }
#songTitle { color: var(--accent); font-size: 20px; font-weight: 700; margin-bottom: 20px; }

.part-section { margin-bottom: 24px; }
.part-title { color: var(--accent); font-weight: 600; margin-bottom: 10px; font-size: 13px; letter-spacing: 0.5px; }
.lyrics-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }

.lyric-box {
  min-height: 80px; background: var(--panel2); border: 1px solid var(--border); border-radius: 8px;
  display: flex; align-items: center; justify-content: center; text-align: center;
  padding: 14px; cursor: pointer; font-size: 15px; font-weight: 500; transition: all 0.15s;
}
.lyric-box:hover { border-color: var(--accent); }
.lyric-box.active { border-color: var(--accent); background: rgba(var(--accent-rgb), 0.1); }

/* RIGHT PANEL (MONITOR) */
.main { width: 340px; background: var(--panel); border-left: 1px solid var(--border); padding: 24px; display: flex; flex-direction: column; gap: 12px; }
.main.hidden { display: none !important; }
.preview-wrapper { position: relative; width: 100%; height: 200px; background: black; border-radius: 8px; border: 1px solid var(--border); overflow: hidden; }
.preview-video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; opacity: 0.5; }
.preview-text { position: absolute; z-index: 2; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; text-align: center; font-size: 18px; font-weight: bold; padding: 12px; text-shadow: 0 2px 4px black; }

/* MODAL / OVERLAY FOR CREATING SONGS */
.modal {
  display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.8); z-index: 10000; align-items: center; justify-content: center;
}
.modal-content {
  background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
  width: 95%; max-width: 600px; max-height: 90vh; padding: 20px; overflow-y: auto;
}
.modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.modal-title { font-size: 18px; font-weight: bold; color: var(--accent); }

/* FORMS */
input, select, textarea {
  width: 100%; background: var(--panel2); border: 1px solid var(--border);
  color: var(--text); padding: 12px; border-radius: 6px; margin-bottom: 12px; font-family: inherit; font-size: 14px;
}
input:focus, select:focus, textarea:focus { border-color: var(--accent); outline: none; }
.btn {
  padding: 12px 16px; border-radius: 6px; font-weight: 600; cursor: pointer; border: 1px solid transparent; font-size: 14px;
}
.btn-primary { background: var(--accent); color: black; }
.btn-secondary { background: transparent; border-color: var(--border); color: var(--text); }
.btn-danger { background: var(--danger); color: white; }

.creator-part-row {
  border: 1px solid var(--border); padding: 12px; border-radius: 6px; margin-bottom: 12px; background: rgba(255,255,255,0.01);
}

/* TOGGLE DESIGN */
.switch-label { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-muted); cursor: pointer; }
.switch { position: relative; width: 34px; height: 18px; background: var(--panel2); border: 1px solid var(--border); border-radius: 9px; }
.switch::after { content: ''; position: absolute; width: 12px; height: 12px; background: var(--text-muted); border-radius: 50%; top: 2px; left: 2px; transition: 0.2s; }
input:checked + .switch { background: rgba(var(--accent-rgb), 0.3); border-color: var(--accent); }
input:checked + .switch::after { left: 18px; background: var(--accent); }

/* ==========================================================
   MOBILE & TABLET RESPONSIVE FIXES
   ========================================================== */
@media (max-width: 900px) {
  body {
    overflow-y: auto; /* Allow full page scroll down on phones */
  }

  .container {
    flex-direction: column;
    height: auto; /* Unbind strict viewport limits */
  }

  /* Stack panels on top of each other */
  .panel, .workspace, .main {
    width: 100% !important;
    height: auto !important;
    border-right: none;
    border-left: none;
    border-bottom: 1px solid var(--border);
    padding: 16px;
  }

  /* Order layouts chronologically for mobile workflows */
  .panel { order: 2; }       /* Song List & Backgrounds go second */
  .workspace { order: 1; }   /* Active Performance workspace stays right at the top! */
  .main { order: 3; }        /* Live Monitor goes to the bottom */

  /* Make lyrics easier to tap on portrait touchscreens */
  .lyrics-grid {
    grid-template-columns: 1fr; /* Single column layout on small screens */
    gap: 8px;
  }

  .lyric-box {
    min-height: 70px;
    font-size: 16px; /* Slightly larger text target */
    padding: 16px;
  }
}

</style>
</head>
<body>

<div class="topbar">
  <div class="brand">🎛 <span>WORSHIP</span> CONTROL CENTER</div>
  <div class="top-actions">
    <button class="btn btn-primary" style="padding: 6px 12px; font-size: 13px;" onclick="openSongCreator()">+ New Song</button>
    <label class="switch-label">
      <span>Monitor</span>
      <input type="checkbox" id="previewToggle" checked style="display:none;" onchange="togglePreview()">
      <div class="switch"></div>
    </label>
  </div>
</div>

<div class="container">
  <div class="panel">
    <div>
      <div class="section-title">Song Database</div>
      <div class="song-list" id="songList">
        <p style="color: var(--text-muted); font-size: 12px;">Loading songs...</p>
      </div>
    </div>

    <div>
      <div class="section-title">Media Overlays</div>
      <div class="bg-grid">
        <button class="bg-thumb" id="bg-bg2.mp4" onclick="setBG('bg2.mp4')">
          <video muted autoplay loop><source src="bg2.mp4" type="video/mp4"></video>
        </button>
        <button class="bg-thumb" id="bg-lv_0_20260611103641.mp4" onclick="setBG('lv_0_20260611103641.mp4')">
          <video muted autoplay loop><source src="lv_0_20260611103641.mp4" type="video/mp4"></video>
        </button>
        <button class="bg-thumb" id="bg-14122662_1920_1080_24fps.mp4" onclick="setBG('14122662_1920_1080_24fps.mp4')">
          <video muted autoplay loop><source src="14122662_1920_1080_24fps.mp4" type="video/mp4"></video>
        </button>
      </div>
      <button class="btn btn-secondary" style="width:100%; margin-top:8px; padding:6px;" onclick="setBG('')">Clear Background</button>
    </div>
  </div>

  <div class="workspace">
    <div id="songTitle">Select a song from the library</div>
    <div id="partsContainer"></div>
  </div>

  <div class="main" id="previewPanel">
    <div class="section-title">Live Engine Monitor</div>
    <div id="bgInfo" style="font-size: 12px; color: var(--text-muted)">Background: Off</div>
    <div class="preview-wrapper">
      <video id="previewVideo" class="preview-video" muted autoplay loop style="display:none;"></video>
      <div class="preview-text" id="preview">Ready</div>
    </div>
    <button class="btn btn-danger" style="padding:6px;" onclick="clearLyrics()">Clear Screen</button>
  </div>
</div>

<div class="modal" id="creatorModal">
  <div class="modal-content">
    <div class="modal-header">
      <div class="modal-title">Create New Song Entry</div>
      <button class="btn btn-secondary" style="padding:4px 8px;" onclick="closeSongCreator()">✕</button>
    </div>
    
    <label class="section-title">Song Title</label>
    <input type="text" id="newSongTitle" placeholder="e.g., Way Maker">

    <div class="section-title" style="margin-top:20px; display:flex; justify-content:space-between; align-items:center;">
      <span>Arrangement Elements</span>
      <button class="btn btn-secondary" style="padding:4px 8px; font-size:11px;" onclick="addPartRow()">+ Add Part</button>
    </div>
    
    <div id="modalPartsContainer"></div>

    <div style="display:flex; gap:12px; justify-content:flex-end; margin-top:20px;">
      <button class="btn btn-secondary" onclick="closeSongCreator()">Cancel</button>
      <button class="btn btn-primary" onclick="saveSongToFirebase()">Save to Library</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBTGuutbEEzmNg9Xd_dPly6DmG3hmW0hPE",
  databaseURL: "https://worship-app-4ab68-default-rtdb.firebaseio.com",
  projectId: "worship-app-4ab68"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let globalSongsStore = {};

/* TOGGLE MONITOR LAYER */
function togglePreview() {
  document.getElementById("previewPanel").classList.toggle("hidden", !document.getElementById("previewToggle").checked);
}

/* LIVE DB SONGS LOADER */
db.ref("songbook").on("value", (snap) => {
  const listEl = document.getElementById("songList");
  listEl.innerHTML = "";
  globalSongsStore = snap.val() || {};
  
  const keys = Object.keys(globalSongsStore);
  if(keys.length === 0) {
    listEl.innerHTML = `<p style="color:var(--text-muted); font-size:12px;">No songs in cloud database.</p>`;
    return;
  }

  keys.forEach(key => {
    const item = globalSongsStore[key];
    const button = document.createElement("div");
    button.className = "cue";
    button.setAttribute("onclick", `renderActiveSong('${key}')`);
    button.innerHTML = `
      <span>${item.title}</span>
      <button class="delete-song-btn" onclick="event.stopPropagation(); deleteSong('${key}')">🗑</button>
    `;
    listEl.appendChild(button);
  });
});

/* DISPLAY ACTIVE TRACK CONTROL GRIDS */
function renderActiveSong(firebaseKey) {
  const song = globalSongsStore[firebaseKey];
  document.getElementById("songTitle").innerText = song.title;
  
  const container = document.getElementById("partsContainer");
  container.innerHTML = "";

  if(!song.parts) return;

  song.parts.forEach(part => {
    const section = document.createElement("div");
    section.className = "part-section";

    const title = document.createElement("div");
    title.className = "part-title";
    title.innerText = part.name;
    section.appendChild(title);

    const grid = document.createElement("div");
    grid.className = "lyrics-grid";

    part.lyrics.forEach(line => {
      if(!line.trim()) return;
      const box = document.createElement("div");
      box.className = "lyric-box";
      box.innerText = line;
      box.onclick = () => db.ref("lyrics").set(line);
      grid.appendChild(box);
    });

    section.appendChild(grid);
    container.appendChild(section);
  });
}

/* CREATOR FORM LOGIC */
function openSongCreator() {
  document.getElementById("modalPartsContainer").innerHTML = "";
  document.getElementById("newSongTitle").value = "";
  addPartRow(); // Default with one structure panel open
  document.getElementById("creatorModal").style.display = "flex";
}

function closeSongCreator() {
  document.getElementById("creatorModal").style.display = "none";
}

function addPartRow() {
  const container = document.getElementById("modalPartsContainer");
  const div = document.createElement("div");
  div.className = "creator-part-row";
  div.innerHTML = `
    <div style="display:flex; gap:8px; margin-bottom:8px;">
      <select class="part-type-select" style="width:40%; margin-bottom:0;">
        <option value="Verse 1">Verse 1</option>
        <option value="Verse 2">Verse 2</option>
        <option value="Verse 3">Verse 3</option>
        <option value="Chorus">Chorus</option>
        <option value="Chorus 2">Chorus 2</option>
        <option value="Bridge">Bridge</option>
        <option value="Pre-Chorus">Pre-Chorus</option>
        <option value="Vamp / Outro">Vamp / Outro</option>
      </select>
      <button class="btn btn-danger" style="padding:0 12px;" onclick="this.parentElement.parentElement.remove()">Remove</button>
    </div>
    <textarea class="part-lyrics-input" rows="3" placeholder="Enter lyrics here. Press Enter to separate presentation blocks/lines."></textarea>
  `;
  container.appendChild(div);
}

function saveSongToFirebase() {
  const title = document.getElementById("newSongTitle").value.trim();
  if(!title) return alert("Please specify a song title");

  const partRows = document.querySelectorAll(".creator-part-row");
  const partsArray = [];

  partRows.forEach(row => {
    const type = row.querySelector(".part-type-select").value;
    const linesText = row.querySelector(".part-lyrics-input").value;
    
    // Split lyrics by line breaks, sanitizing whitespace gaps
    const lyrics = linesText.split("\n").map(l => l.trim()).filter(l => l.length > 0);
    
    if(lyrics.length > 0) {
      partsArray.push({ name: type, lyrics: lyrics });
    }
  });

  if(partsArray.length === 0) return alert("Add at least one segment containing lyrics.");

  db.ref("songbook").push({
    title: title,
    parts: partsArray
  }).then(() => {
    closeSongCreator();
  });
}

function deleteSong(key) {
  if(confirm("Permanently erase this track profile from the database?")) {
    db.ref(`songbook/${key}`).remove();
    document.getElementById("songTitle").innerText = "Select a song from the library";
    document.getElementById("partsContainer").innerHTML = "";
  }
}

/* OUTBOUND ENGINE MUTATORS */
function setBG(name) { db.ref("bg").set(name); }
function clearLyrics() { db.ref("lyrics").set(""); }

/* LIVE MONITOR MIRROR SYNC */
db.ref("lyrics").on("value", (snap) => {
  const currentText = snap.val() || "";
  document.getElementById("preview").innerText = currentText || "--- Blackout ---";
  document.querySelectorAll(".lyric-box").forEach(el => {
    el.classList.toggle("active", el.innerText === currentText);
  });
});

db.ref("bg").on("value", (snap) => {
  const bgName = snap.val();
  const videoElement = document.getElementById("previewVideo");
  const bgInfoText = document.getElementById("bgInfo");
  document.querySelectorAll(".bg-thumb").forEach(el => el.classList.remove("active"));
  
  if (bgName) {
    bgInfoText.innerText = "Background Layer: " + bgName;
    videoElement.src = bgName;
    videoElement.style.display = "block";
    const thumbMatch = document.getElementById("bg-" + bgName);
    if(thumbMatch) thumbMatch.classList.add("active");
  } else {
    bgInfoText.innerText = "Background Layer: Off";
    videoElement.style.display = "none";
    videoElement.src = "";
  }
});
</script>
</body>
</html>
