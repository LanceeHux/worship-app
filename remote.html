
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Worship Controller</title>

<style>
:root {
  --accent: #ffcd00;
  --accent-rgb: 255, 205, 0;
  --bg: #09090b;
  --panel: #121214;
  --panel2: #1a1a1e;
  --border: #2a2a30;
  --text: #f4f4f5;
  --text-muted: #a1a1aa;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  overflow: hidden;
}

/* TOPBAR */
.topbar {
  padding: 16px 24px;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.brand {
  font-weight: 700;
  letter-spacing: 0.5px;
  font-size: 16px;
}

.brand span {
  color: var(--accent);
}

/* TOGGLE SWITCH */
.toggle-container {
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  user-select: none;
  font-size: 14px;
  color: var(--text-muted);
}

.switch {
  position: relative;
  width: 44px;
  height: 22px;
  background: var(--panel2);
  border: 1px solid var(--border);
  border-radius: 11px;
  transition: 0.3s;
}

.switch::after {
  content: '';
  position: absolute;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: var(--text-muted);
  top: 2px;
  left: 2px;
  transition: 0.3s;
}

#previewToggle:checked + .switch {
  background: rgba(var(--accent-rgb), 0.2);
  border-color: var(--accent);
}

#previewToggle:checked + .switch::after {
  left: 24px;
  background: var(--accent);
}

/* MAIN LAYOUT */
.container {
  display: flex;
  height: calc(100vh - 54px);
}

/* LEFT CONTROL PANEL */
.panel {
  width: 360px;
  background: var(--panel);
  border-right: 1px solid var(--border);
  padding: 20px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.section-title {
  color: var(--text-muted);
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin-bottom: 10px;
}

.song-buttons {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.cue {
  width: 100%;
  padding: 14px;
  background: var(--panel2);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 8px;
  cursor: pointer;
  text-align: left;
  font-weight: 500;
  transition: all 0.2s ease;
}

.cue:hover {
  border-color: var(--accent);
  background: rgba(var(--accent-rgb), 0.05);
}

#songTitle {
  color: var(--accent);
  font-weight: 700;
  font-size: 18px;
  margin-top: 10px;
  text-transform: none;
  letter-spacing: normal;
}

/* BG SELECTION GRAPHICS */
.bg-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}

.bg-thumb {
  background: var(--panel2);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 0;
  cursor: pointer;
  overflow: hidden;
  height: 60px;
  position: relative;
  transition: border-color 0.2s;
}

.bg-thumb:hover, .bg-thumb.active {
  border-color: var(--accent);
}

.bg-thumb video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* CENTRAL WORKSPACE */
.workspace {
  flex: 1;
  padding: 24px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 24px;
}

.part-title {
  color: var(--accent);
  font-weight: 600;
  margin: 20px 0 10px;
  font-size: 14px;
  letter-spacing: 0.5px;
}

.lyrics-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}

.lyric-box {
  min-height: 90px;
  background: var(--panel2);
  border: 1px solid var(--border);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 16px;
  cursor: pointer;
  font-size: 15px;
  font-weight: 500;
  line-height: 1.4;
  transition: all 0.15s ease;
}

.lyric-box:hover {
  border-color: var(--accent);
  background: rgba(var(--accent-rgb), 0.02);
}

.lyric-box.active {
  border-color: var(--accent);
  background: rgba(var(--accent-rgb), 0.1);
  box-shadow: 0 0 12px rgba(var(--accent-rgb), 0.15);
}

/* RIGHT PREVIEW PANEL */
.main {
  width: 400px;
  background: var(--panel);
  border-left: 1px solid var(--border);
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  transition: all 0.3s ease;
}

.main.hidden {
  display: none !important;
}

.preview-wrapper {
  position: relative;
  width: 100%;
  height: 250px;
  background: black;
  border-radius: 12px;
  border: 1px solid var(--border);
  overflow: hidden;
}

.preview-video {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: 1;
  opacity: 0.6; /* Slight dimming to guarantee lyric readability */
}

.preview-text {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 2;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  font-size: 24px;
  font-weight: bold;
  padding: 24px;
  text-shadow: 0 2px 8px rgba(0,0,0,0.9);
}

#bgInfo {
  color: var(--text-muted);
  font-size: 12px;
}

/* RESPONSIVE DESIGN */
@media (max-width: 1024px) {
  .container { flex-direction: column; overflow: auto; }
  .panel { width: 100%; height: auto; border-right: none; border-bottom: 1px solid var(--border); }
  .main { width: 100%; border-left: none; border-top: 1px solid var(--border); }
  .lyrics-grid { grid-template-columns: repeat(2, 1fr); }
}

@media (min-width: 1400px) {
  .lyrics-grid { grid-template-columns: repeat(3, 1fr); }
}
</style>
</head>

<body>

<div class="topbar">
  <div class="brand">🎛 <span>WORSHIP</span> CONTROLLER</div>
  <label class="toggle-container">
    <span>Live Preview Panel</span>
    <input type="checkbox" id="previewToggle" checked style="display:none;" onchange="togglePreview()">
    <div class="switch"></div>
  </label>
</div>

<div class="container">

  <div class="panel">
    <div>
      <div class="section-title">Songs</div>
      <div class="song-buttons">
        <button class="cue" onclick="loadSong(0)">Here as in Heaven</button>
        <button class="cue" onclick="loadSong(1)">Amazing Grace</button>
      </div>
    </div>

    <div>
      <div class="section-title">Backgrounds</div>
      <div class="bg-grid">
        <button class="bg-thumb" id="bg-bg2.mp4" onclick="setBG('bg2.mp4')">
          <video muted autoplay loop><source src="bg2.mp4" type="video/mp4"></video>
        </button>
        <button class="bg-thumb" id="bg-lv_0_20260611103641.mp4" onclick="setBG('lv_0_20260611103641.mp4')">
          <video muted autoplay loop><source src="lv_0_20260611103641.mp4" type="video/mp4"></video>
        </button>
        <button class="bg-thumb" id="bg-14122662_1920_1080_24fps.mp4" onclick="setBG('14122662_1920_1080_24fps.mp4')">
          <video muted autoplay loop><source src="14122662_1920_1080_24fps.mp4" type="video/mp4"></video>
        </button>
      </div>
    </div>
  </div>

  <div class="workspace">
    <div class="section-title" id="songTitle">Select a Song to Display Lyrics</div>
    <div id="partsContainer">
      <p style="color: var(--text-muted); font-size: 13px;">No presentation loaded.</p>
    </div>
  </div>

  <div class="main" id="previewPanel">
    <div class="section-title">Output Layer Monitor</div>
    <div id="bgInfo">Background Layer: Off</div>
    <div class="preview-wrapper">
      <video id="previewVideo" class="preview-video" muted autoplay loop style="display: none;"></video>
      <div class="preview-text" id="preview">Ready</div>
    </div>
  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBTGuutbEEzmNg9Xd_dPly6DmG3hmW0hPE",
  databaseURL: "https://worship-app-4ab68-default-rtdb.firebaseio.com",
  projectId: "worship-app-4ab68"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const songs = [
  {
    title:"Here as in Heaven",
    parts:[
      {
        name:"Verse 1",
        lyrics:["The atmosphere is changing now", "For the Spirit of the Lord is here", "The evidence is all around", "That the Spirit of the Lord is here"]
      },
      {
        name:"Chorus",
        lyrics:["Overflow in this place", "Fill our hearts with your love", "Your love surrounds us", "You're the reason we came", "to encounter Your love"]
      },
      {
        name:"Verse 2",
        lyrics:["A miracle can happen now", "for the Spirit of the Lord is here", "the evidence is all around", "that the Spirit of the Lord is here"]
      },
      {
        name:"Bridge",
        lyrics:["Spirit of God fall fresh on us", "we need Your Presence", "Your kingdom come", "Your will be done", "here as in heaven"]
      }
    ]
  },
  {
    title:"Amazing Grace",
    parts:[
      {
        name:"Verse 1",
        lyrics:["Amazing grace", "How sweet the sound", "That saved a wretch", "Like me"]
      }
    ]
  }
];

function togglePreview() {
  const checkbox = document.getElementById("previewToggle");
  const panel = document.getElementById("previewPanel");
  if(checkbox.checked) {
    panel.classList.remove("hidden");
  } else {
    panel.classList.add("hidden");
  }
}

function setBG(name){
  db.ref("bg").set(name);
}

function loadSong(index){
  const song = songs[index];
  document.getElementById("songTitle").innerText = song.title;
  
  const container = document.getElementById("partsContainer");
  container.innerHTML = "";

  song.parts.forEach(part => {
    const title = document.createElement("div");
    title.className = "part-title";
    title.innerText = part.name;
    container.appendChild(title);

    const grid = document.createElement("div");
    grid.className = "lyrics-grid";

    part.lyrics.forEach(line => {
      if(!line.trim()) return; // Skip empty line slots
      const box = document.createElement("div");
      box.className = "lyric-box";
      box.innerText = line;

      box.onclick = () => {
        db.ref("lyrics").set(line);
        document.querySelectorAll(".lyric-box").forEach(el => el.classList.remove("active"));
        box.classList.add("active");
      };
      grid.appendChild(box);
    });
    container.appendChild(grid);
  });
}

/* LIVE MONITOR SYNC */
db.ref("lyrics").on("value", (snap) => {
  const currentText = snap.val() || "Ready";
  document.getElementById("preview").innerText = currentText;
  
  // Visual active link for manual clicks inside panel updates
  document.querySelectorAll(".lyric-box").forEach(el => {
    if(el.innerText === currentText) el.classList.add("active");
    else el.classList.remove("active");
  });
});

db.ref("bg").on("value", (snap) => {
  const bgName = snap.val();
  const videoElement = document.getElementById("previewVideo");
  const bgInfoText = document.getElementById("bgInfo");
  
  document.querySelectorAll(".bg-thumb").forEach(el => el.classList.remove("active"));
  
  if (bgName) {
    bgInfoText.innerText = "Background Layer: " + bgName;
    videoElement.src = bgName;
    videoElement.style.display = "block";
    
    const thumbMatch = document.getElementById("bg-" + bgName);
    if(thumbMatch) thumbMatch.classList.add("active");
  } else {
    bgInfoText.innerText = "Background Layer: Off";
    videoElement.style.display = "none";
    videoElement.src = "";
  }
});
</script>

</body>
</html>
