<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body {
    margin: 0;
    height: 100vh;
    background: #0a0a0a;
    color: white;
    font-family: sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .card {
    background: #111;
    padding: 3rem;
    border: 1px solid #333;
    border-radius: 20px;
    text-align: center;
    max-width: 400px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  }

  .logo-placeholder {
    width: 100px;
    height: 100px;
    background: #222;
    margin: 0 auto 20px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
  }

  h1 { margin: 10px 0; font-weight: 300; letter-spacing: 2px; }
  h3 { color: #888; font-weight: 400; margin-bottom: 30px; }

  .instruction-box {
    background: #1a1a1a;
    padding: 15px;
    border-radius: 10px;
    text-align: left;
    margin-bottom: 25px;
    font-size: 0.9rem;
  }

  button, a {
    display: block;
    background: white;
    color: black;
    padding: 15px;
    text-decoration: none;
    border-radius: 8px;
    font-weight: bold;
    transition: background 0.3s;
  }
  button, a:hover { background: #ccc; }
  .card {
    background: #111;
    padding: 3rem;
    border: 1px solid #333;
    border-radius: 20px;
    text-align: center;
    max-width: 400px;
    border-left: 2px solid #ffcd00;
  }

  .logo-container {
    width: 120px; /* Adjust this to the size you want */
    height: 120px;
    margin: 0 auto 20px;
    overflow: hidden;
    border-radius: 12px; /* Optional: smooth corners */
  }

  .logo-container img {
    width: 100%;
    height: 100%;
    object-fit: contain; /* Ensures logo isn't cropped or stretched */
  }

  h1 { 
    margin: 10px 0; 
    font-weight: 300; 
    letter-spacing: 2px; 
    text-transform: uppercase;
  }

  h3 { 
    color: #666; 
    font-weight: 400; 
    margin-bottom: 30px; 
  }
button, a {
margin: 3px;
border: 2px solid black;
</style>
</head>
<body>

<div class="card">
  <div class="logo-container">
    <img src="Edit 1 - May 23.png" alt="Young Adults Logo">
  </div>
  
  <h1>Young Adults</h1>
  <h3>Praise & Worship Portal</h3>

  <div class="instruction-box">
    <strong>Usage Instruction</strong>
    <ol><strong>Phone B(Cast for TV)</strong>
      <li>Click `Display` for TV Casting</li>
<strong>Phone A (Presenter Remote)</strong>
<li><Click `Admin Remote` and enter the remote's password.</li>
    </ol>
  </div>

  <p id="availableText" style="color:red"></p>
  <a onclick="checkAvailability()">Display TV</a>
<button onclick="Admin()" style="background: #ffcd00;">Admin Remote</a>
</div>
  <script>
function Admin() {
let pass=window.prompt('Remote Password:'); if(pass!=='trece'||'Trece'||'TRECE' { 
alert('Invalid Remote’s Password.');
} else { 
window.location.href('controller.html');
}
    // TV DISPLAY //
    let isAvailable = false;
    // TV DISPLAY: [TRUE / FALSE] //
    function checkAvailability() {
      if (!isAvailable) {
        document.getElementById("availableText").textContent = "There's no active Praise & Worship at the moment.";
      } else {
        window.location.href = "display.html";
      }
    }
  </script>

</body>
</html>
