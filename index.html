<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  height:100vh;
  overflow:hidden;
  background:black;
}

/* background video */
#bg{
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
  transition: opacity 0.8s ease;
}

/* lyrics */
#lyrics{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:90vw;          /* add this */
  max-width:1200px;    /* optional limit */
  padding:20px;

  color:white;
  font-size:4rem;
  text-align:center;
  text-shadow:0 0 15px black;

  white-space:pre-line;
  opacity:1;
  transition: opacity 0.2s ease;
}

/* fullscreen button */
#fsbtn{
  position:fixed;
  top:10px;
  right:10px;
  z-index:9999;
  padding:10px 15px;
  font-size:14px;
}

  #ui-layer {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: rgba(0, 0, 0, 0.6); /* Semi-transparent film */
  backdrop-filter: blur(8px);       /* Professional glass effect */
  z-index: 100;
  transition: opacity 0.5s ease;
}

.brand img {
  width: 150px;
  margin-bottom: 20px;
}

.instructions {
  background: rgba(255, 255, 255, 0.1);
  padding: 30px;
  border-radius: 15px;
  border: 1px solid rgba(255, 255, 255, 0.2);
  text-align: center;
  max-width: 400px;
}

.cast-note {
  margin-top: 20px;
  color: #ccc;
  font-style: italic;
}

/* Hide UI when display starts */
.hidden { opacity: 0; pointer-events: none; }
</style>
</head>

<body>
<!-- Move your existing elements inside a container -->
<div id="ui-layer">
  <!-- Brand Area -->
  <div class="brand">
    <img src="YOUR_LOGO_URL.png" alt="Young Adult Logo">
    <h1>Young Adult Worship</h1>
  </div>

  <!-- Instruction Card -->
  <div class="instructions">
    <h2>Display Ready</h2>
    <p>Click <strong>Display TV</strong> below to initialize the stream.</p>
    <div class="cast-note">
      <small>For the best experience, please cast this device to the TV.</small>
    </div>
  </div>
</div>

<!-- Keep your existing #lyrics, #bg, and #fsbtn -->
<!-- BACKGROUND -->
<video id="bg" autoplay muted loop></video>

<!-- LYRICS -->
<div id="lyrics">Loading...</div>

<!-- FULLSCREEN BUTTON -->
<button id="fsbtn" onclick="goFullscreen()">Fullscreen</button>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<script>

/* FULLSCREEN */
function goFullscreen(){
  const elem = document.documentElement;
  if (elem.requestFullscreen) elem.requestFullscreen();
  else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
  else if (elem.msRequestFullscreen) elem.msRequestFullscreen();
}

/* FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyBTGuutbEEzmNg9Xd_dPly6DmG3hmW0hPE",
  databaseURL: "https://worship-app-4ab68-default-rtdb.firebaseio.com",
  projectId: "worship-app-4ab68"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* LYRICS LISTENER (NEW SYSTEM) */
const lyricsEl = document.getElementById("lyrics");

db.ref("lyrics").on("value", (snap) => {
  const text = snap.val() || "";

  // fade out fast
  lyricsEl.style.opacity = 0;

  setTimeout(() => {
    lyricsEl.innerHTML = text;

    // fade in fast
    lyricsEl.style.opacity = 1;
  }, 150);
});

/* BACKGROUND SWITCHER */
db.ref("bg").on("value", (snap) => {
  const video = document.getElementById("bg");
  const src = snap.val();

  if (!src) return;

  video.style.opacity = 0;

  setTimeout(() => {
    video.src = src;
    video.load();

    video.oncanplay = () => {
      video.play();
      video.style.opacity = 1;
    };
  }, 300);
});

</script>

</body>
</html>
