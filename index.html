<!DOCTYPE html>
<html>
<head>
<style>
body{
  margin:0;
  height:100vh;
  overflow:hidden;
}

#bg{
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
  transition: opacity 0.8s ease;
}

#lyrics{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  color:white;
  font-size:4rem;
  text-align:center;
  text-shadow:0 0 15px black;
}
</style>
</head>
 
<body>

<video id="bg" autoplay muted loop></video>

<div id="lyrics">Loading...</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<script>
  function goFullscreen(){
  const elem = document.documentElement;

  if (elem.requestFullscreen) {
    elem.requestFullscreen();
  } else if (elem.webkitRequestFullscreen) {
    elem.webkitRequestFullscreen();
  } else if (elem.msRequestFullscreen) {
    elem.msRequestFullscreen();
  }
}
  
const firebaseConfig = {
  apiKey: "AIzaSyBTGuutbEEzmNg9Xd_dPly6DmG3hmW0hPE",
  databaseURL: "https://worship-app-4ab68-default-rtdb.firebaseio.com",
  projectId: "worship-app-4ab68"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const slides = [
  "Verse 1",
  "Verse 2",
  "Chorus"
];

db.ref("slide").on("value", (snap) => {
  const index = snap.val() || 0;
  document.getElementById("lyrics").innerHTML = slides[index];
});
  
db.ref("bg").on("value", (snap) => {
  const video = document.getElementById("bg");
  const src = snap.val();

  if (!src) return;

  video.style.opacity = 0;

  setTimeout(() => {
    video.src = src;
    video.load();

    video.oncanplay = () => {
      video.play();
      video.style.opacity = 1;
    };
  }, 300);
});
</script>

</body>
   <button onclick="goFullscreen()" style="position:fixed;top:10px;right:10px;z-index:9999;">
Fullscreen
</button>
</html>
