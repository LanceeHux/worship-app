<!DOCTYPE html>
<html>
<head>
<style>
body{
  margin:0;
  height:100vh;
  overflow:hidden;
}

#bg{
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
}

#lyrics{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  color:white;
  font-size:4rem;
  text-align:center;
  text-shadow:0 0 15px black;
}
</style>
</head>
<body>

<video id="bg" autoplay muted loop>
  <source src="background.mp4" type="video/mp4">
</video>

<div id="lyrics">
Amazing grace<br>
How sweet the sound
</div>
<script>
  window.addEventListener("storage", (e) => {
    console.log("Storage changed:", e.key, e.newValue);
});
const slides = [
  "Amazing Grace",
  "How Sweet The Sound",
  "Praise The Lord"
];

function updateLyrics(){
  const index =
    Number(localStorage.getItem("currentSlide")) || 0;

  document.getElementById("lyrics").innerHTML =
    slides[index];
}

updateLyrics();

window.addEventListener("storage", updateLyrics);
</script>
</body>
</html>
