<!DOCTYPE html>
<html>
<head>
<style>
body{
  margin:0;
  height:100vh;
  overflow:hidden;
}

#bg{
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
  transition: opacity 0.8s ease;
}

#lyrics{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  color:white;
  font-size:4rem;
  text-align:center;
  text-shadow:0 0 15px black;
}
</style>
</head>
<body>

<video id="bg" autoplay muted loop>
  <source src="background.mp4" type="video/mp4">
</video>

<div id="lyrics">Loading...</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBTGuutbEEzmNg9Xd_dPly6DmG3hmW0hPE",
  databaseURL: "https://worship-app-4ab68-default-rtdb.firebaseio.com",
  projectId: "worship-app-4ab68"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const slides = [
  "Verse 1",
  "Verse 2",
  "Chorus"
];

db.ref("slide").on("value", (snap) => {
  const index = snap.val() || 0;
  document.getElementById("lyrics").innerHTML = slides[index];
});
</script>

</body>
</html>
