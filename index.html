<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body {
    margin: 0;
    height: 100vh;
    background: #0a0a0a;
    color: white;
    font-family: sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .card {
    background: #111;
    padding: 3rem;
    border: 1px solid #333;
    border-radius: 20px;
    text-align: center;
    max-width: 400px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  }

  .logo-placeholder {
    width: 100px;
    height: 100px;
    background: #222;
    margin: 0 auto 20px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
  }

  h1 { margin: 10px 0; font-weight: 300; letter-spacing: 2px; }
  h3 { color: #888; font-weight: 400; margin-bottom: 30px; }

  .instruction-box {
    background: #1a1a1a;
    padding: 15px;
    border-radius: 10px;
    text-align: left;
    margin-bottom: 25px;
    font-size: 0.9rem;
  }

  a {
    display: block;
    background: white;
    color: black;
    padding: 15px;
    text-decoration: none;
    border-radius: 8px;
    font-weight: bold;
    transition: background 0.3s;
  }
  a:hover { background: #ccc; }
  .card {
    background: #111;
    padding: 3rem;
    border: 1px solid #333;
    border-radius: 20px;
    text-align: center;
    max-width: 400px;
    border-left: 2px solid #ffcd00;
  }

  .logo-container {
    width: 120px; /* Adjust this to the size you want */
    height: 120px;
    margin: 0 auto 20px;
    overflow: hidden;
    border-radius: 12px; /* Optional: smooth corners */
  }

  .logo-container img {
    width: 100%;
    height: 100%;
    object-fit: contain; /* Ensures logo isn't cropped or stretched */
  }

  h1 { 
    margin: 10px 0; 
    font-weight: 300; 
    letter-spacing: 2px; 
    text-transform: uppercase;
  }

  h3 { 
    color: #666; 
    font-weight: 400; 
    margin-bottom: 30px; 
  }
</style>
</head>
<body>

<div class="card">
  <div class="logo-container">
    <img src="Edit 1 - May 23.png" alt="Young Adults Logo">
  </div>
  
  <h1>Young Adults</h1>
  <h3>Worship Presenter</h3>

  <div class="instruction-box">
    <strong>Setup Instructions:</strong>
    <ol>
      <li>Connect this device to the TV/Projector Cast.</li>
      <li>Ensure the network is stable.</li>
      <li>Click the button below to start.</li>
    </ol>
  </div>

  <a href="display.html">Display TV</a>
</div>

</body>
</html>
